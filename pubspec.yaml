name: kaigin_pet
description: "Kaigin Pet — Virtual Pet Self-Care app built with Flutter Clean Architecture + BLoC."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Localization
  easy_localization: ^3.0.7

  # Navigation
  go_router: ^17.0.1

  # Persistence
  shared_preferences: ^2.3.2

  # Date formatting
  intl: ^0.20.2

  # DI
  get_it: ^9.2.0
  injectable: ^2.7.1+4

  # Code generation annotations
  json_annotation: ^4.9.0

  # Fonts
  google_fonts: ^6.3.3


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.6.0
  json_serializable: ^6.9.0
  injectable_generator: ^2.9.1

  # Rename tool
  change_app_package_name: ^1.5.0


flutter:
  uses-material-design: true

  assets:
    - assets/translations/
